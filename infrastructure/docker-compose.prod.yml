# ElephantBroker — Production Docker Compose
# Brings up the FULL stack: runtime, HITL, Postgres, Neo4j, Qdrant, Redis.
#
# Usage:
#   cp infrastructure/.env.prod.example infrastructure/.env.prod
#   # Edit .env.prod with real credentials
#   docker compose -f infrastructure/docker-compose.prod.yml --env-file infrastructure/.env.prod up -d
#
# Bootstrap (first run only):
#   docker compose -f infrastructure/docker-compose.prod.yml exec elephantbroker \
#     ebrun bootstrap --org-name "YourOrg" --team-name "YourTeam" --admin-name "admin"

version: "3.9"

services:

  # ── Relational DB (audit stores) ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: elephantbroker
      POSTGRES_USER: elephantbroker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elephantbroker -d elephantbroker"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Graph store ─────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    restart: always
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2g
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Vector store ─────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.0
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache / distributed lock ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ElephantBroker runtime ────────────────────────────────────────────────────
  elephantbroker:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8420:8420"
    environment:
      EB_GATEWAY_ID: ${EB_GATEWAY_ID}
      EB_ORG_ID: ${EB_ORG_ID:-}
      EB_TEAM_ID: ${EB_TEAM_ID:-}
      EB_NEO4J_URI: bolt://neo4j:7687
      EB_NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      EB_QDRANT_URL: http://qdrant:6333
      EB_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      EB_POSTGRES_DSN: postgresql://elephantbroker:${POSTGRES_PASSWORD}@postgres:5432/elephantbroker
      EB_LLM_MODEL: ${EB_LLM_MODEL}
      EB_LLM_ENDPOINT: ${EB_LLM_ENDPOINT}
      EB_LLM_API_KEY: ${EB_LLM_API_KEY}
      EB_EMBEDDING_ENDPOINT: ${EB_EMBEDDING_ENDPOINT:-${EB_LLM_ENDPOINT}}
      EB_EMBEDDING_API_KEY: ${EB_EMBEDDING_API_KEY:-${EB_LLM_API_KEY}}
      EB_RERANKER_ENDPOINT: ${EB_RERANKER_ENDPOINT:-http://localhost:1235}
      EB_HITL_CALLBACK_SECRET: ${EB_HITL_CALLBACK_SECRET}
      EB_LOG_FORMAT: json
      EB_LOG_LEVEL: info
      COGNEE_DISABLE_TELEMETRY: "true"
    # Run migrations THEN start the server
    command: >
      sh -c "elephantbroker migrate --config /app/config/default.yaml &&
             elephantbroker serve --config /app/config/default.yaml --host 0.0.0.0 --port 8420"
    healthcheck:
      test: ["CMD", "elephantbroker", "health-check", "--host", "localhost", "--port", "8420"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── HITL middleware ────────────────────────────────────────────────────────────
  hitl:
    build:
      context: ../hitl-middleware
      dockerfile: Dockerfile
    restart: always
    depends_on:
      elephantbroker:
        condition: service_healthy
    ports:
      - "8421:8421"
    environment:
      HITL_HOST: 0.0.0.0
      HITL_PORT: 8421
      HITL_LOG_LEVEL: info
      EB_HITL_CALLBACK_SECRET: ${EB_HITL_CALLBACK_SECRET}
      EB_RUNTIME_URL: http://elephantbroker:8420
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8421/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Observability stack (optional — enable with --profile observability) ──────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - clickhouse
      - jaeger
    profiles: [observability]

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    profiles: [observability]

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
    environment:
      SPAN_STORAGE_TYPE: memory
      COLLECTOR_OTLP_ENABLED: "true"
    profiles: [observability]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    profiles: [observability]

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  redis_data:
  clickhouse_data:
  grafana_data:

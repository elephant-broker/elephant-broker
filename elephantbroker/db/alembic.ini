# Alembic configuration for ElephantBroker
# DSN is resolved from EB_POSTGRES_DSN env var at runtime (see env.py).
# This value is only used as a fallback for offline SQL generation.

[alembic]
script_location = %(here)s
version_locations = %(here)s/versions
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
sqlalchemy.url = postgresql+asyncpg://elephantbroker:elephantbroker@localhost:5432/elephantbroker

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
